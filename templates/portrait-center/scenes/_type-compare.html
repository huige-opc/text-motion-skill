<!-- ============================================================
 _type-compare.html — 对比 / 选择（fullscreen · 左右对照）

 用途：展示前后对比、方案优劣、选择决策。

 v3 机制：
 - 每行"传统 → 新方案"为独立卡片，用 localT 逐条淡入
 - CSS 只有初始 opacity:0 / transform，触发靠 X.fadeUp
 - 结尾结论用 ct（与口播"所以你看"同步）

 v3 硬约束：
 - .eb 眉标：20px / fw:700
 - 行内字 .before/.after：18px（左右对齐）
 - 颜色只走 var(--hf-*)

 常见坑：
 - 【多行齐出】用 ct 触发 → 换 localT stagger
 - 【左右不平衡】.before / .after 缺 flex:1 或 min-width
============================================================ -->
<style>
.s4{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 100px;background:var(--hf-bg);overflow:hidden}
.s4 .eb{display:inline-flex;align-items:center;gap:10px;padding:10px 24px;border-radius:999px;font-size:20px;font-weight:700;color:var(--hf-text-muted);border:1px solid color-mix(in srgb,var(--hf-text-muted) 14%,transparent);background:color-mix(in srgb,var(--hf-bg) 90%,#fff);opacity:0;transform:translateY(12px);margin-bottom:32px}
.s4 .eb .d{width:6px;height:6px;border-radius:50%;background:var(--hf-primary)}
.s4 .t{font-size:52px;font-weight:800;color:var(--hf-text);line-height:1.5;text-align:center;opacity:0;transform:translateY(18px);margin-bottom:36px}
.s4 .t .h{color:var(--hf-primary)}
.s4 .list{display:flex;flex-direction:column;gap:14px;width:1080px;max-width:100%}
.s4 .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px;padding:18px 24px;border-radius:14px;background:#fff;border:1px solid color-mix(in srgb,var(--hf-text-muted) 8%,transparent);opacity:0;transform:translateX(-12px);box-shadow:0 4px 16px rgba(0,0,0,.03)}
.s4 .row .before{font-size:22px;color:var(--hf-text-muted);text-align:right;line-height:1.5}
.s4 .row .arrow{width:36px;height:36px;border-radius:50%;background:color-mix(in srgb,var(--hf-primary) 10%,transparent);color:var(--hf-primary);display:flex;align-items:center;justify-content:center}
.s4 .row .arrow svg{width:20px;height:20px}
.s4 .row .after{font-size:22px;color:var(--hf-text);font-weight:700;line-height:1.5}
.s4 .row .after .h{color:var(--hf-primary)}
.s4 .ft{font-size:22px;color:var(--hf-text);margin-top:36px;text-align:center;opacity:0;transform:translateY(12px)}
.s4 .ft .h{color:var(--hf-primary);font-weight:800}
.br{position:absolute;bottom:22px;left:50%;display:flex;align-items:center;gap:12px;opacity:0;transform:translate(-50%,10px)}
.br .bt{width:180px;height:3px;border-radius:2px;background:color-mix(in srgb,var(--hf-text-muted) 12%,transparent);overflow:hidden}
.br .bt .bf{height:100%;width:0;background:var(--hf-primary);border-radius:2px}
.br .bl{font-size:11px;color:var(--hf-text-muted);font-family:monospace;letter-spacing:1px;opacity:.6}
</style>

<div class="s4">
  <div class="eb"><span class="d"></span>前后对比</div>
  <div class="t">同一件事 · <span class="h">两种做法</span></div>
  <div class="list">
    <div class="row"><div class="before">传统做法</div><div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div><div class="after">新<span class="h">方法</span></div></div>
    <div class="row"><div class="before">旧体验</div><div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div><div class="after">新<span class="h">体验</span></div></div>
    <div class="row"><div class="before">手动 · 慢</div><div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div><div class="after"><span class="h">自动 · 快</span></div></div>
    <div class="row"><div class="before">一次一次做</div><div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div><div class="after"><span class="h">一劳永逸</span></div></div>
  </div>
  <div class="ft">所以你看 · <span class="h">差别在这里</span></div>
</div>
<div class="br"><div class="bt"><div class="bf"></div></div><span class="bl">NN / NN</span></div>

<script>
(function(){
  var SCENE_OFFSET=0, SCENE_DUR=12;
  var a=document.getElementById('audio-player'); if(!a||!window.AX) return;
  var X=window.AX, d={};
  var enterT=null;
  function tk(){
    var r=document.querySelector('.s4'); if(!r) return;
    var ct=a.currentTime-SCENE_OFFSET;
    if(ct<0){ requestAnimationFrame(tk); return; }
    if(enterT===null) enterT=performance.now();
    var localT=(performance.now()-enterT)/1000;

    // 行 stagger 用 localT
    if(localT>=0.0 && !d.eb){d.eb=1; X.fadeUp(r.querySelector('.eb'),450,12)}
    if(localT>=0.4 && !d.t ){d.t =1; X.fadeUp(r.querySelector('.t'),600,18)}
    if(localT>=1.4 && !d.r1){d.r1=1; X.fadeUp(r.querySelectorAll('.list .row')[0],500,0)}
    if(localT>=2.1 && !d.r2){d.r2=1; X.fadeUp(r.querySelectorAll('.list .row')[1],500,0)}
    if(localT>=2.8 && !d.r3){d.r3=1; X.fadeUp(r.querySelectorAll('.list .row')[2],500,0)}
    if(localT>=3.5 && !d.r4){d.r4=1; X.fadeUp(r.querySelectorAll('.list .row')[3],500,0)}
    // 结论走 ct
    if(ct>=8.0 && !d.ft){d.ft=1; X.fadeUp(r.querySelector('.ft'),550,12)}
    if(!d.br){d.br=1; X.fadeUpBar(r.querySelector('.br'),500)}
    var bf=r.querySelector('.br .bf');
    if(bf) bf.style.width = Math.min(100, Math.max(0, ct*100/SCENE_DUR)) + '%';
    requestAnimationFrame(tk);
  }
  requestAnimationFrame(tk);
})();
</script>
