<!-- ============================================================
 _type-stats.html — 数据大字报（fullscreen · 三卡横排）

 用途：用数字冲击力展示数据/成果，每个数字入场触发 countUp 递增。

 v3 机制：
 - 卡片入场链用 localT（挂钟秒数），保证键盘切帧后不会齐出
 - 数字递增用 X.countUp(el, target, dur)，独立 RAF，不和主 tick 混
 - 结尾语用 ct（要和"总结口播"对齐）
 - 底部进度条走 ct

 v3 硬约束：
 - .eb 眉标：20px / fw:700
 - 卡片主字 .n：36-96px / fw:800 / line-height:1 / white-space:nowrap
 - 卡片副标 .u：18px / muted
 - 颜色只走 var(--hf-*)

 常见坑：
 - 【三张齐出】用 ct 触发多卡片入场 → 换 localT
 - 【数字闪烁】countUp 塞进主 tick 里 → 独立 RAF
 - 【数字换行】.n 忘了 white-space:nowrap / line-height:1
============================================================ -->
<style>
.s2{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 60px;background:var(--hf-bg);overflow:hidden}
.s2 .eb{display:inline-flex;align-items:center;gap:10px;padding:10px 24px;border-radius:999px;font-size:20px;font-weight:700;color:var(--hf-text-muted);border:1px solid color-mix(in srgb,var(--hf-text-muted) 14%,transparent);background:color-mix(in srgb,var(--hf-bg) 90%,#fff);opacity:0;transform:translateY(12px);margin-bottom:32px}
.s2 .eb .d{width:6px;height:6px;border-radius:50%;background:var(--hf-primary)}
.s2 .t{font-size:56px;font-weight:800;color:var(--hf-text);line-height:1.5;text-align:center;opacity:0;transform:translateY(18px);margin-bottom:44px}
.s2 .t .h{color:var(--hf-primary)}
.s2 .row{display:flex;gap:24px;align-items:stretch}
.s2 .row .card{width:280px;background:#fff;border-radius:16px;padding:28px 24px;border:1px solid color-mix(in srgb,var(--hf-text-muted) 8%,transparent);opacity:0;transform:translateY(24px);position:relative;box-shadow:0 8px 24px rgba(0,0,0,.04)}
.s2 .row .card .ic{width:40px;height:40px;border-radius:10px;background:color-mix(in srgb,var(--hf-primary) 10%,transparent);display:flex;align-items:center;justify-content:center;color:var(--hf-primary);margin-bottom:14px}
.s2 .row .card .ic svg{width:22px;height:22px}
.s2 .row .card .n{font-size:72px;font-weight:800;color:var(--hf-primary);line-height:1;font-variant-numeric:tabular-nums;white-space:nowrap}
.s2 .row .card .u{font-size:18px;color:var(--hf-text-muted);margin-top:8px;line-height:1.6}
.s2 .row .card.hi{background:var(--hf-primary);border-color:transparent;box-shadow:0 16px 40px color-mix(in srgb,var(--hf-primary) 30%,transparent)}
.s2 .row .card.hi .ic{background:rgba(255,255,255,.18);color:#fff}
.s2 .row .card.hi .n{color:#fff}
.s2 .row .card.hi .u{color:rgba(255,255,255,.85)}
.s2 .ft{font-size:22px;color:var(--hf-text);margin-top:36px;text-align:center;opacity:0;transform:translateY(12px)}
.s2 .ft .h{color:var(--hf-primary);font-weight:800}
.br{position:absolute;bottom:22px;left:50%;display:flex;align-items:center;gap:12px;opacity:0;transform:translate(-50%,10px)}
.br .bt{width:180px;height:3px;border-radius:2px;background:color-mix(in srgb,var(--hf-text-muted) 12%,transparent);overflow:hidden}
.br .bt .bf{height:100%;width:0;background:var(--hf-primary);border-radius:2px}
.br .bl{font-size:11px;color:var(--hf-text-muted);font-family:monospace;letter-spacing:1px;opacity:.6}
</style>

<div class="s2">
  <div class="eb"><span class="d"></span>数据概览</div>
  <div class="t">看看 <span class="h">这些数字</span> 背后的意义</div>
  <div class="row">
    <div class="card">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
      <div class="n" id="n1">0</div>
      <div class="u">数据一说明</div>
    </div>
    <div class="card hi">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3 8 6-16 3 8h4"/></svg></div>
      <div class="n" id="n2">0</div>
      <div class="u">数据二说明</div>
    </div>
    <div class="card">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg></div>
      <div class="n" id="n3">0</div>
      <div class="u">数据三说明</div>
    </div>
  </div>
  <div class="ft">总结一句 · <span class="h">强调关键点</span></div>
</div>
<div class="br"><div class="bt"><div class="bf"></div></div><span class="bl">NN / NN</span></div>

<script>
(function(){
  var SCENE_OFFSET=0, SCENE_DUR=12;
  var a=document.getElementById('audio-player'); if(!a||!window.AX) return;
  var X=window.AX, d={};
  var enterT=null;                     // 场景挂钟起点（首次 tick 锁定）
  function tk(){
    var r=document.querySelector('.s2'); if(!r) return;
    var ct=a.currentTime-SCENE_OFFSET;
    if(ct<0){ requestAnimationFrame(tk); return; }
    if(enterT===null) enterT=performance.now();
    var localT=(performance.now()-enterT)/1000;

    // 卡片入场用 localT（保证从场景进入起递进，即便键盘切帧也不齐出）
    if(localT>=0.0 && !d.eb){d.eb=1; X.fadeUp(r.querySelector('.eb'),450,12)}
    if(localT>=0.3 && !d.t ){d.t =1; X.fadeUp(r.querySelector('.t'),600,18)}
    if(localT>=1.5 && !d.c1){d.c1=1; X.fadeUp(r.querySelectorAll('.row .card')[0],550,24); X.countUp(r.querySelector('#n1'),100,900)}
    if(localT>=2.4 && !d.c2){d.c2=1; X.fadeUp(r.querySelectorAll('.row .card')[1],550,24); X.countUp(r.querySelector('#n2'),300,1200,'+')}
    if(localT>=3.5 && !d.c3){d.c3=1; X.fadeUp(r.querySelectorAll('.row .card')[2],550,24); X.countUp(r.querySelector('#n3'),4,900,'h')}
    // 结尾语用 ct（与"总结口播"同步）
    if(ct>=8.0 && !d.ft){d.ft=1; X.fadeUp(r.querySelector('.ft'),550,12)}
    if(!d.br){d.br=1; X.fadeUpBar(r.querySelector('.br'),500)}
    var bf=r.querySelector('.br .bf');
    if(bf) bf.style.width = Math.min(100, Math.max(0, ct*100/SCENE_DUR)) + '%';
    requestAnimationFrame(tk);
  }
  requestAnimationFrame(tk);
})();
</script>
