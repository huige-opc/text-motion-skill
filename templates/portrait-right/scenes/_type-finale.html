<!-- ============================================================
 _type-finale.html — 结尾 CTA（fullscreen · 金句居中 + 按钮）

 用途：视频结尾，总结 + 行动号召（关注/链接/下期预告）。

 v3 机制：
 - 元素少 → 直接用 ct 触发（每个元素配一句口播时间点）
 - CTA / 签名的正向偏移放在 ct 后，口播结束后仍能触发
 - 禁止 CSS transition / animation shorthand → 全部 window.AX

 v3 硬约束：
 - .eb 眉标：20px / fw:700
 - .quote 金句：48-64px / fw:800 / lh:1.5
 - .quote2 阐释：24-32px / lh:1.8（换行处主动 <br>，长短平衡）
 - .btn：18px / fw:800
 - 颜色只走 var(--hf-*)

 常见坑：
 - 【CTA 出不来】写了 t < SCENE_DUR 上界 → 只写 t>=0
============================================================ -->
<style>
.s5{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 80px;background:var(--hf-bg);overflow:hidden}
.s5 .eb{display:inline-flex;align-items:center;gap:10px;padding:10px 24px;border-radius:999px;font-size:20px;font-weight:700;color:var(--hf-text-muted);border:1px solid color-mix(in srgb,var(--hf-text-muted) 14%,transparent);background:color-mix(in srgb,var(--hf-bg) 90%,#fff);opacity:0;transform:translateY(12px);margin-bottom:32px}
.s5 .eb .d{width:6px;height:6px;border-radius:50%;background:var(--hf-primary)}
.s5 .quote{font-size:56px;font-weight:800;color:var(--hf-text);line-height:1.5;text-align:center;opacity:0;transform:translateY(18px);margin-bottom:24px;max-width:1200px}
.s5 .quote .h{color:var(--hf-primary)}
.s5 .quote .strike{position:relative;display:inline-block;color:var(--hf-text-muted)}
.s5 .quote .strike::after{content:'';position:absolute;left:-4px;right:-4px;top:50%;height:4px;background:var(--hf-primary);transform:scaleX(0);transform-origin:left;border-radius:2px}
.s5 .quote.stk .strike::after{transform:scaleX(1);transition:transform .6s cubic-bezier(.2,.7,.2,1)}
.s5 .quote2{font-size:30px;color:var(--hf-text-muted);line-height:1.8;text-align:center;opacity:0;transform:translateY(14px);margin-bottom:40px;max-width:1100px}
.s5 .quote2 .h{color:var(--hf-primary);font-weight:800}
.s5 .cta{display:flex;gap:18px;align-items:center;opacity:0;transform:translateY(16px)}
.s5 .cta .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 26px;border-radius:10px;font-size:18px;font-weight:800;background:var(--hf-primary);color:#fff;box-shadow:0 12px 28px color-mix(in srgb,var(--hf-primary) 34%,transparent);white-space:nowrap}
.s5 .cta .btn svg{width:20px;height:20px}
.s5 .cta .btn.ghost{background:#fff;color:var(--hf-primary);border:1.5px solid var(--hf-primary);box-shadow:none}
.s5 .cta .hint{font-size:18px;color:var(--hf-text-muted);margin-left:8px}
.s5 .sig{margin-top:28px;font-size:16px;color:var(--hf-text-muted);letter-spacing:2px;font-family:monospace;opacity:0;transform:translateY(8px);white-space:nowrap}
.s5 .sig b{color:var(--hf-primary)}
.br{position:absolute;bottom:22px;left:50%;display:flex;align-items:center;gap:12px;opacity:0;transform:translate(-50%,10px)}
.br .bt{width:180px;height:3px;border-radius:2px;background:color-mix(in srgb,var(--hf-text-muted) 12%,transparent);overflow:hidden}
.br .bt .bf{height:100%;width:0;background:var(--hf-primary);border-radius:2px}
.br .bl{font-size:11px;color:var(--hf-text-muted);font-family:monospace;letter-spacing:1px;opacity:.6}
</style>

<div class="s5">
  <div class="eb"><span class="d"></span>结尾 · 关注收藏</div>
  <div class="quote">工具的价值不是<span class="strike">让你更快</span><br>是<span class="h">让你能做以前做不到的事</span></div>
  <div class="quote2">把 <span class="h">重复的活</span> 交给机器<br>把你 <span class="h">解放出来</span> 想内容 · 讲故事</div>
  <div class="cta">
    <div class="btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>先收藏</div>
    <div class="btn ghost"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>关注我</div>
    <span class="hint">别等要用的时候找不到</span>
  </div>
  <div class="sig">CHANNEL · <b>YOUR-BRAND</b> · 拿来即用</div>
</div>
<div class="br"><div class="bt"><div class="bf"></div></div><span class="bl">NN / NN</span></div>

<script>
(function(){
  var SCENE_OFFSET=0, SCENE_DUR=12;
  var a=document.getElementById('audio-player'); if(!a||!window.AX) return;
  var X=window.AX, d={};
  function tk(){
    var r=document.querySelector('.s5'); if(!r) return;
    var ct=a.currentTime-SCENE_OFFSET;
    if(ct>=0){
      if(ct>0    && !d.eb ){d.eb =1; X.fadeUp(r.querySelector('.eb'),450,12)}
      if(ct>=0.3 && !d.q1 ){d.q1 =1; X.fadeUp(r.querySelector('.quote'),650,18)}
      // 划掉动画：走 class 切换 + CSS transition（transition 允许，
      // 血训只禁 animation shorthand + @keyframes；transition 只吃单条 transform 是安全的）
      if(ct>=2.2 && !d.stk){d.stk=1; r.querySelector('.quote').classList.add('stk')}
      if(ct>=5.5 && !d.q2 ){d.q2 =1; X.fadeUp(r.querySelector('.quote2'),650,14)}
      if(ct>=9.0 && !d.cta){d.cta=1; X.fadeUp(r.querySelector('.cta'),650,16)}
      // sig 正向偏移到最后，即便口播已结束也能触发（tick 只判 t>=0）
      if(ct>=10.5 && !d.sig){d.sig=1; X.fadeUp(r.querySelector('.sig'),550,8)}
      if(!d.br){d.br=1; X.fadeUpBar(r.querySelector('.br'),500)}
    }
    var bf=r.querySelector('.br .bf');
    if(bf) bf.style.width = Math.min(100, Math.max(0, ct*100/SCENE_DUR)) + '%';
    requestAnimationFrame(tk);
  }
  requestAnimationFrame(tk);
})();
</script>
