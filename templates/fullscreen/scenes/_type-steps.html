<!-- ============================================================
 _type-steps.html — 流程步骤（fullscreen · 三卡横排 + 箭头）

 用途：分步骤展示流程/方法论，卡片逐张登场（不齐出）。

 v3 机制：
 - 卡片入场链用 localT（挂钟秒数），键盘切帧不会一次性齐出
 - 结尾语句用 ct（要和口播"最后一句"对齐）
 - 每张卡片带独立编号 / 图标 / 描述

 v3 硬约束：
 - .eb 眉标：20px / fw:700
 - 卡片主字 .n：24-32px / fw:800 / lh:1.4
 - 卡片描述 .m：16-18px / lh:1.6
 - STEP 标签 .idx / .tag：letter-spacing>0 时必须 white-space:nowrap
 - 颜色只走 var(--hf-*)

 常见坑：
 - 【三张齐出】卡片入场用了 ct 而非 localT
 - 【badge 竖排】absolute 定位缺 nowrap
============================================================ -->
<style>
.s3{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 80px;background:var(--hf-bg);overflow:hidden}
.s3 .eb{display:inline-flex;align-items:center;gap:10px;padding:10px 24px;border-radius:999px;font-size:20px;font-weight:700;color:var(--hf-text-muted);border:1px solid color-mix(in srgb,var(--hf-text-muted) 14%,transparent);background:color-mix(in srgb,var(--hf-bg) 90%,#fff);opacity:0;transform:translateY(12px);margin-bottom:32px}
.s3 .eb .d{width:6px;height:6px;border-radius:50%;background:var(--hf-primary)}
.s3 .t{font-size:56px;font-weight:800;color:var(--hf-text);line-height:1.5;text-align:center;opacity:0;transform:translateY(18px);margin-bottom:44px}
.s3 .t .h{color:var(--hf-primary)}
.s3 .row{display:flex;gap:24px;align-items:stretch}
.s3 .row .step{width:280px;background:#fff;border-radius:16px;padding:28px 24px;border:1px solid color-mix(in srgb,var(--hf-text-muted) 8%,transparent);opacity:0;transform:translateY(24px);position:relative;box-shadow:0 8px 24px rgba(0,0,0,.04)}
.s3 .row .step .idx{position:absolute;top:-14px;left:24px;background:var(--hf-primary);color:#fff;font-size:16px;font-weight:800;letter-spacing:2px;padding:5px 12px;border-radius:6px;font-family:monospace;white-space:nowrap}
.s3 .row .step .ic{width:44px;height:44px;border-radius:10px;background:color-mix(in srgb,var(--hf-primary) 10%,transparent);display:flex;align-items:center;justify-content:center;color:var(--hf-primary);margin-bottom:14px;margin-top:6px}
.s3 .row .step .ic svg{width:26px;height:26px}
.s3 .row .step .n{font-size:28px;font-weight:800;color:var(--hf-text);line-height:1.4}
.s3 .row .step .m{font-size:18px;color:var(--hf-text-muted);margin-top:6px;line-height:1.6}
.s3 .row .step.hi{background:var(--hf-primary);border-color:transparent;box-shadow:0 16px 40px color-mix(in srgb,var(--hf-primary) 30%,transparent)}
.s3 .row .step.hi .idx{background:#fff;color:var(--hf-primary)}
.s3 .row .step.hi .ic{background:rgba(255,255,255,.18);color:#fff}
.s3 .row .step.hi .n{color:#fff}
.s3 .row .step.hi .m{color:rgba(255,255,255,.85)}
.s3 .arr{display:flex;align-items:center;color:color-mix(in srgb,var(--hf-text-muted) 30%,transparent);font-size:26px;opacity:0}
.s3 .ft{font-size:22px;color:var(--hf-text);margin-top:36px;text-align:center;opacity:0;transform:translateY(12px)}
.s3 .ft .h{color:var(--hf-primary);font-weight:800}
.br{position:absolute;bottom:22px;left:50%;display:flex;align-items:center;gap:12px;opacity:0;transform:translate(-50%,10px)}
.br .bt{width:180px;height:3px;border-radius:2px;background:color-mix(in srgb,var(--hf-text-muted) 12%,transparent);overflow:hidden}
.br .bt .bf{height:100%;width:0;background:var(--hf-primary);border-radius:2px}
.br .bl{font-size:11px;color:var(--hf-text-muted);font-family:monospace;letter-spacing:1px;opacity:.6}
</style>

<div class="s3">
  <div class="eb"><span class="d"></span>方法总览</div>
  <div class="t">本质上就 <span class="h">三步</span> 搞定</div>
  <div class="row">
    <div class="step">
      <div class="idx">STEP 01</div>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h12l4 4v12H4z"/><path d="M14 4v6h6"/><path d="M8 14h8M8 18h8M8 10h3"/></svg></div>
      <div class="n">第一步</div>
      <div class="m">简短描述 · 关键动作</div>
    </div>
    <div class="arr">›</div>
    <div class="step">
      <div class="idx">STEP 02</div>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg></div>
      <div class="n">第二步</div>
      <div class="m">简短描述 · 承接前一步</div>
    </div>
    <div class="arr">›</div>
    <div class="step hi">
      <div class="idx">STEP 03</div>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="1"/><path d="M7 6v12M11 6v12M15 6v12M19 6v12"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/></svg></div>
      <div class="n">第三步</div>
      <div class="m">收尾 · 关键收益</div>
    </div>
  </div>
  <div class="ft">前两步是铺垫 · <span class="h">第三步才是核心</span></div>
</div>
<div class="br"><div class="bt"><div class="bf"></div></div><span class="bl">NN / NN</span></div>

<script>
(function(){
  var SCENE_OFFSET=0, SCENE_DUR=10;
  var a=document.getElementById('audio-player'); if(!a||!window.AX) return;
  var X=window.AX, d={};
  var enterT=null;
  function tk(){
    var r=document.querySelector('.s3'); if(!r) return;
    var ct=a.currentTime-SCENE_OFFSET;
    if(ct<0){ requestAnimationFrame(tk); return; }
    if(enterT===null) enterT=performance.now();
    var localT=(performance.now()-enterT)/1000;

    // 卡片 stagger 入场用 localT
    if(localT>=0.0 && !d.eb){d.eb=1; X.fadeUp(r.querySelector('.eb'),450,12)}
    if(localT>=0.4 && !d.t ){d.t =1; X.fadeUp(r.querySelector('.t'),600,18)}
    if(localT>=1.5 && !d.s1){d.s1=1; X.fadeUp(r.querySelectorAll('.row .step')[0],550,24)}
    if(localT>=1.9 && !d.a1){d.a1=1; var el=r.querySelectorAll('.row .arr')[0]; if(el) X.fadeUp(el,300,0)}
    if(localT>=2.4 && !d.s2){d.s2=1; X.fadeUp(r.querySelectorAll('.row .step')[1],550,24)}
    if(localT>=2.8 && !d.a2){d.a2=1; var el2=r.querySelectorAll('.row .arr')[1]; if(el2) X.fadeUp(el2,300,0)}
    if(localT>=3.5 && !d.s3){d.s3=1; X.fadeUp(r.querySelectorAll('.row .step')[2],650,24)}
    // 结尾语用 ct（与"前两步是铺垫 · 第三步才是核心"同步）
    if(ct>=6.5 && !d.ft){d.ft=1; X.fadeUp(r.querySelector('.ft'),550,12)}
    if(!d.br){d.br=1; X.fadeUpBar(r.querySelector('.br'),500)}
    var bf=r.querySelector('.br .bf');
    if(bf) bf.style.width = Math.min(100, Math.max(0, ct*100/SCENE_DUR)) + '%';
    requestAnimationFrame(tk);
  }
  requestAnimationFrame(tk);
})();
</script>
